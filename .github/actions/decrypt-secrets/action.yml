name: 'Decrypt and Mask Secrets'
description: 'Decrypts a zip and masks the JSON contents as env vars'
inputs:
  zip_password:
    description: 'Password for the Zip'
    required: true
  zip_path:
    description: 'Path to the encrypted zip'
    required: false
    default: 'secrets.zip'

runs:
  using: "composite"
  steps:
    - name: Install python deps
      shell: bash
      run: pip install pyzipper

    - name: Decrypt and Mask
      shell: python
      env:
        # 将 inputs 映射为环境变量，避免 Python 语法注入问题
        ZIP_PASSWORD: ${{ inputs.zip_password }}
        ZIP_PATH: ${{ inputs.zip_path }}
      run: |
        import pyzipper
        import json
        import os
        import sys

        # 1. 从环境变量获取密码和路径
        zip_password = os.environ.get('ZIP_PASSWORD')
        zip_path = os.environ.get('ZIP_PATH')

        if not zip_password:
            print("Error: 密码为空，请检查外部工作流是否正确传入了 zip_password！", file=sys.stderr)
            sys.exit(1)

        # 2. 解压并读取 json
        try:
            # 明确使用 'r' 读取模式
            with pyzipper.AESZipFile(zip_path, 'r') as zf:
                # 将密码转为 UTF-8 的 bytes
                zf.setpassword(zip_password.encode('utf-8'))
                with zf.open('secrets.json') as f:
                    secrets = json.load(f)
        except Exception as e:
            print(f"Error 解密失败: {e}", file=sys.stderr)
            sys.exit(1)

        # 3. 写入 GitHub Env 并设置 Masking
        with open(os.environ['GITHUB_ENV'], 'a') as env_file:
            for key, value in secrets.items():
                if value is not None:
                    # 确保 JSON 的数字或布尔值被转为字符串
                    val_str = str(value)
                    
                    # 警告：不要对空字符串进行 add-mask，否则会导致 Actions 隐藏所有空白日志
                    if val_str.strip(): 
                        print(f"::add-mask::{val_str}")
                    
                    env_file.write(f"{key}={val_str}\n")
        
        print(f"Successfully masked {len(secrets)} secrets.")
